<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C026D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle border -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#circleGrad)" stroke-width="3.5" stroke-dasharray="240 40" stroke-linecap="round"/>
  <!-- D letter -->
  <text x="10" y="68" font-family="Georgia, serif" font-size="52" font-weight="900" fill="url(#letterGrad)">DN</text>
  <!-- Sparkle -->
  <polygon points="82,14 83.5,18 87.5,14 83.5,10" fill="#F97316" opacity="0.9"/>
  <polygon points="87,8 88,11 91,8 88,5" fill="#60A5FA" opacity="0.8"/>
</svg>
